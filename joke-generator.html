<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generador de chistes aleatorios. Genera chistes graciosos en tiempo real usando API externa.">
    <meta name="keywords" content="chistes, generador, humor, API, random jokes">
    <title>Generador de Chistes Aleatorios 😂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            animation: fadeIn 0.5s ease-in;
        }

        .subtitle {
            color: #666;
            font-size: 1em;
            margin-bottom: 30px;
        }

        .joke-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin: 30px 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            line-height: 1.6;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            animation: slideIn 0.5s ease-out;
        }

        .joke-box.loading {
            background: linear-gradient(90deg, #667eea 25%, #764ba2 50%, #667eea 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .secondary-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .secondary-btn:hover {
            background: #f0f0f0;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        .error.show {
            display: block;
        }

        .stats {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #666;
            font-size: 0.9em;
        }

        .joke-type {
            margin: 20px 0;
            color: #999;
            font-size: 0.85em;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2em;
            }

            .joke-box {
                font-size: 1.1em;
                padding: 20px;
                min-height: 120px;
            }

            button {
                padding: 12px 24px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Generador de Chistes</h1>
        <p class="subtitle">¡Obtén un chiste aleatorio cada vez que hagas clic!</p>

        <div class="error" id="errorBox"></div>

        <div class="joke-box" id="jokeBox">
            Haz clic en el botón para obtener un chiste...
        </div>

        <div class="joke-type" id="jokeType"></div>

        <div class="button-group">
            <button id="getJokeBtn" onclick="getJoke()">🎲 Obtener Chiste</button>
            <button class="secondary-btn" onclick="clearJoke()">🗑️ Limpiar</button>
        </div>

        <div class="stats">
            <p>Chistes generados: <strong id="counter">0</strong></p>
            <p>API: JokeAPI (https://jokeapi.dev)</p>
        </div>
    </div>

    <script>
        let jokeCount = 0;

        async function getJoke() {
            const jokeBox = document.getElementById('jokeBox');
            const errorBox = document.getElementById('errorBox');
            const btn = document.getElementById('getJokeBtn');
            const jokeType = document.getElementById('jokeType');

            // Mostrar estado de carga
            jokeBox.classList.add('loading');
            jokeBox.textContent = 'Cargando chiste... 🤔';
            errorBox.classList.remove('show');
            btn.disabled = true;

            try {
                // Usar JokeAPI - API gratuita de chistes
                const response = await fetch('https://v2.jokeapi.dev/joke/Any?lang=es');
                
                if (!response.ok) {
                    throw new Error('Error al obtener el chiste');
                }

                const data = await response.json();

                // Remover estado de carga
                jokeBox.classList.remove('loading');

                // Procesar el chiste
                if (data.type === 'single') {
                    jokeBox.textContent = data.joke;
                    jokeType.textContent = `Tipo: Chiste simple`;
                } else if (data.type === 'twopart') {
                    jokeBox.innerHTML = `
                        <div style="text-align: left; width: 100%;">
                            <div style="margin-bottom: 20px;">
                                <strong>Pregunta:</strong> ${data.setup}
                            </div>
                            <div style="border-top: 2px solid rgba(255,255,255,0.3); padding-top: 20px;">
                                <strong>Respuesta:</strong> ${data.delivery}
                            </div>
                        </div>
                    `;
                    jokeType.textContent = `Tipo: Pregunta y respuesta`;
                }

                // Incrementar contador
                jokeCount++;
                document.getElementById('counter').textContent = jokeCount;

            } catch (error) {
                jokeBox.classList.remove('loading');
                jokeBox.textContent = '❌ Error al obtener el chiste';
                errorBox.classList.add('show');
                errorBox.textContent = `Error: ${error.message}. Por favor, intenta de nuevo.`;
                console.error('Error:', error);
            } finally {
                btn.disabled = false;
            }
        }

        function clearJoke() {
            document.getElementById('jokeBox').textContent = 'Haz clic en el botón para obtener un chiste...';
            document.getElementById('jokeBox').classList.remove('loading');
            document.getElementById('jokeType').textContent = '';
            document.getElementById('errorBox').classList.remove('show');
        }

        // Obtener un chiste al cargar la página
        window.addEventListener('load', () => {
            setTimeout(() => {
                getJoke();
            }, 500);
        });
    </script>
</body>
</html>
